services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_homework
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "6584:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d auth_homework"]
      interval: 5s
      timeout: 3s
      retries: 10

  auth:
    build: ./auth_service
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/auth_homework
      JWT_SECRET: change-me-in-production
      JWT_ALGORITHM: HS256
      JWT_TTL_MINUTES: 60
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  posts:
    build: ./posts_service
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/auth_homework
      JWT_SECRET: change-me-in-production
      JWT_ALGORITHM: HS256
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
